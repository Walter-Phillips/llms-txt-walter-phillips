name = "llms-txt-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Observability
[observability]
enabled = true

# Static assets served by Worker (optional — primary UI is Next.js on Vercel,
# but we host a tiny /about page and the public /sites/:domain/llms.txt route here).

# ─── Bindings ──────────────────────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "llms_txt"
database_id = "e2c9f29d-e313-4a00-acf4-ec2cc0165095"
migrations_dir = "../../packages/db/migrations"

[[r2_buckets]]
binding = "FILES"
bucket_name = "llms-txt-files"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "d723182e19684d55b1f2cfc10f8ad30b"

[[queues.producers]]
binding = "CRAWL_QUEUE"
queue = "crawl-queue"

[[queues.producers]]
binding = "MONITOR_QUEUE"
queue = "monitor-queue"

[[queues.consumers]]
queue = "crawl-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 2
dead_letter_queue = "crawl-dlq"

[[queues.consumers]]
queue = "monitor-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 2
dead_letter_queue = "monitor-dlq"

[[durable_objects.bindings]]
name = "SITE_COORDINATOR"
class_name = "SiteCoordinator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SiteCoordinator"]

# Secrets:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put SENTRY_DSN
#   wrangler secret put AXIOM_TOKEN

# Cron: every 15 minutes, enqueue monitor jobs for due sites.
[triggers]
crons = ["*/15 * * * *"]

[vars]
APP_ORIGIN = "https://llms-txt-web.vercel.app"
# SENTRY_TRACES_SAMPLE_RATE = "0"
# AXIOM_DATASET = "llms-txt-prod"
