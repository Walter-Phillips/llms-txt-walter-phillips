name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-api.yml"
      - "apps/api/**"
      - "packages/config/**"
      - "packages/db/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: pnpm --filter @profound-takehome/api typecheck

      - name: Test API
        run: pnpm --filter @profound-takehome/api test

      - name: Apply D1 migrations
        working-directory: apps/api
        run: pnpm run db:migrate:remote

      - name: Deploy Worker
        working-directory: apps/api
        run: pnpm run deploy
